<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Modular System Integration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: var(--bg-primary, #ffffff); }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .loading { color: orange; }
        button { padding: 8px 16px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; }
        .test-btn { background: #007bff; color: white; }
        .test-btn:hover { background: #0056b3; }
        .log { background: #f8f9fa; padding: 10px; border-radius: 4px; margin: 10px 0; font-family: monospace; font-size: 12px; }
        input, select { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🧪 Enhanced Modular System Integration Test</h1>
    
    <div class="test-section">
        <h3>Module Loading Test</h3>
        <div id="module-loading-result">Testing...</div>
        <button class="test-btn" onclick="testModuleLoading()">Re-test Module Loading</button>
    </div>
    
    <div class="test-section">
        <h3>Theme Management Test</h3>
        <div id="theme-result">Ready</div>
        <button class="test-btn" onclick="testThemeManager()">Test Theme Toggle</button>
        <button class="test-btn" onclick="resetTheme()">Reset to Light</button>
    </div>
    
    <div class="test-section">
        <h3>State Management Test</h3>
        <div id="state-result">Ready</div>
        <button class="test-btn" onclick="testStateManager()">Test State Operations</button>
        <div class="log" id="state-log"></div>
    </div>
    
    <div class="test-section">
        <h3>UI Manager Test</h3>
        <div id="ui-result">Ready</div>
        <input type="text" id="test-input" placeholder="Type something to test UI">
        <button class="test-btn" onclick="testUIManager()">Test UI Operations</button>
        <div class="log" id="ui-log"></div>
    </div>
    
    <div class="test-section">
        <h3>Agent System Test</h3>
        <div id="agent-result">Ready</div>
        <select id="agent-select">
            <option value="orchestrator">Orchestrator</option>
            <option value="plot_generator">Plot Generator</option>
            <option value="custom_agent">Custom Agent</option>
        </select>
        <button class="test-btn" onclick="testAgentSystem()">Test Agent Detection & Styling</button>
        <div class="log" id="agent-log"></div>
    </div>
    
    <div class="test-section">
        <h3>WebSocket Service Test</h3>
        <div id="websocket-result">Ready</div>
        <button class="test-btn" onclick="testWebSocketService()">Test WebSocket Functions</button>
        <div class="log" id="websocket-log"></div>
    </div>
    
    <div class="test-section">
        <h3>API Service Test</h3>
        <div id="api-result">Ready</div>
        <button class="test-btn" onclick="testAPIService()">Test API Methods</button>
        <div class="log" id="api-log"></div>
    </div>
    
    <div class="test-section">
        <h3>Integration Test</h3>
        <div id="integration-result">Ready</div>
        <button class="test-btn" onclick="testFullIntegration()">Test Full Integration</button>
        <div class="log" id="integration-log"></div>
    </div>

    <!-- Load enhanced modular system -->
    <script src="static/js/modules/api.js"></script>
    <script src="static/js/modules/websocket.js"></script>
    <script src="static/js/modules/state.js"></script>
    <script src="static/js/modules/ui.js"></script>
    <script src="static/js/modules/agents.js"></script>
    <script src="static/js/modules/theme.js"></script>
    <script src="static/js/chat-enhanced.js"></script>
    
    <script>
        // Test functions
        function logResult(sectionId, message, isError = false) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.className = isError ? 'error' : 'success';
                element.textContent = message;
            }
        }
        
        function logToSection(logId, message) {
            const log = document.getElementById(logId);
            if (log) {
                log.textContent += new Date().toLocaleTimeString() + ': ' + message + '\n';
            }
        }
        
        function testModuleLoading() {
            const results = [];
            
            try {
                if (typeof apiService !== 'undefined') {
                    results.push('✓ API Service loaded');
                } else {
                    results.push('✗ API Service failed to load');
                }
                
                if (typeof webSocketService !== 'undefined') {
                    results.push('✓ WebSocket Service loaded');
                } else {
                    results.push('✗ WebSocket Service failed to load');
                }
                
                if (typeof stateManager !== 'undefined') {
                    results.push('✓ State Manager loaded');
                } else {
                    results.push('✗ State Manager failed to load');
                }
                
                if (typeof uiManager !== 'undefined') {
                    results.push('✓ UI Manager loaded');
                } else {
                    results.push('✗ UI Manager failed to load');
                }
                
                if (typeof agentManager !== 'undefined') {
                    results.push('✓ Agent Manager loaded');
                } else {
                    results.push('✗ Agent Manager failed to load');
                }
                
                if (typeof themeManager !== 'undefined') {
                    results.push('✓ Theme Manager loaded');
                } else {
                    results.push('✗ Theme Manager failed to load');
                }
                
                if (typeof enhancedChatApp !== 'undefined') {
                    results.push('✓ Enhanced Chat App loaded');
                } else {
                    results.push('✗ Enhanced Chat App failed to load');
                }
                
                const hasErrors = results.some(r => r.includes('✗'));
                logResult('module-loading-result', results.join(', '), hasErrors);
                
            } catch (error) {
                logResult('module-loading-result', 'Error: ' + error.message, true);
            }
        }
        
        function testThemeManager() {
            try {
                const initialTheme = themeManager.getCurrentTheme();
                logToSection('theme-log', `Initial theme: ${initialTheme}`);
                
                const newTheme = themeManager.toggleTheme();
                logToSection('theme-log', `Toggled to: ${newTheme}`);
                
                const isDark = themeManager.isDarkTheme();
                logToSection('theme-log', `Is dark theme: ${isDark}`);
                
                logResult('theme-result', 'Theme management working correctly');
            } catch (error) {
                logResult('theme-result', 'Error: ' + error.message, true);
                logToSection('theme-log', 'Error: ' + error.message);
            }
        }
        
        function resetTheme() {
            themeManager.setTheme('light');
            logToSection('theme-log', 'Reset to light theme');
        }
        
        function testStateManager() {
            try {
                // Test basic state operations
                stateManager.set('testKey', 'testValue');
                const value = stateManager.get('testKey');
                logToSection('state-log', `Set/Get test: ${value === 'testValue' ? 'PASS' : 'FAIL'}`);
                
                // Test state subscription
                let subscriptionTriggered = false;
                const unsubscribe = stateManager.subscribe('testSubscription', (newValue) => {
                    subscriptionTriggered = true;
                    logToSection('state-log', `Subscription triggered with: ${newValue}`);
                });
                
                stateManager.set('testSubscription', 'subscribeTest');
                logToSection('state-log', `Subscription test: ${subscriptionTriggered ? 'PASS' : 'FAIL'}`);
                
                // Test state updates
                stateManager.update({
                    testUpdate1: 'value1',
                    testUpdate2: 'value2'
                });
                logToSection('state-log', 'Batch update completed');
                
                // Test history
                const history = stateManager.getHistory();
                logToSection('state-log', `History entries: ${history.length}`);
                
                unsubscribe();
                logResult('state-result', 'State management working correctly');
                
            } catch (error) {
                logResult('state-result', 'Error: ' + error.message, true);
                logToSection('state-log', 'Error: ' + error.message);
            }
        }
        
        function testUIManager() {
            try {
                // Test element getting
                const input = uiManager.getElement('test-input');
                logToSection('ui-log', `Element retrieval: ${input ? 'PASS' : 'FAIL'}`);
                
                // Test content operations
                uiManager.setContent('ui-result', 'UI Manager Test Active');
                const content = uiManager.getContent('test-input');
                logToSection('ui-log', `Content operations: PASS`);
                
                // Test visibility operations
                uiManager.setVisible('ui-log', true);
                logToSection('ui-log', 'Visibility operations: PASS');
                
                // Test dropdown operations (if elements exist)
                const testData = [
                    { id: 1, name: 'Option 1' },
                    { id: 2, name: 'Option 2' }
                ];
                // Note: This will fail gracefully if no dropdown exists
                
                logResult('ui-result', 'UI Manager working correctly');
                
            } catch (error) {
                logResult('ui-result', 'Error: ' + error.message, true);
                logToSection('ui-log', 'Error: ' + error.message);
            }
        }
        
        function testAgentSystem() {
            try {
                const selectedAgent = document.getElementById('agent-select').value;
                
                // Test agent config retrieval
                const config = agentManager.getAgentConfig(selectedAgent);
                logToSection('agent-log', `Agent config retrieved: ${config.name}`);
                
                // Test agent detection
                const mockData = { content: `This is a ${selectedAgent} message`, agent: selectedAgent };
                const detected = agentManager.detectAgentFromMessage(mockData);
                logToSection('agent-log', `Agent detection: ${detected}`);
                
                // Test workflow detection
                const workflowContent = 'orchestrator routing to plot_then_author workflow';
                const isWorkflow = agentManager.isOrchestratorWorkflow(workflowContent);
                logToSection('agent-log', `Workflow detection: ${isWorkflow ? 'PASS' : 'FAIL'}`);
                
                // Test dynamic styling
                agentManager.addAgentStyle(selectedAgent);
                logToSection('agent-log', 'Dynamic styling applied');
                
                logResult('agent-result', 'Agent system working correctly');
                
            } catch (error) {
                logResult('agent-result', 'Error: ' + error.message, true);
                logToSection('agent-log', 'Error: ' + error.message);
            }
        }
        
        function testWebSocketService() {
            try {
                // Test connection state
                const state = webSocketService.getConnectionState();
                logToSection('websocket-log', `Connection state: ${state}`);
                
                // Test session info
                const sessionInfo = webSocketService.getSessionInfo();
                logToSection('websocket-log', `Session info: ${JSON.stringify(sessionInfo)}`);
                
                // Test message handler registration
                webSocketService.onMessage('test', (data) => {
                    logToSection('websocket-log', 'Test message handler triggered');
                });
                logToSection('websocket-log', 'Message handler registered');
                
                logResult('websocket-result', 'WebSocket service structure working correctly');
                
            } catch (error) {
                logResult('websocket-result', 'Error: ' + error.message, true);
                logToSection('websocket-log', 'Error: ' + error.message);
            }
        }
        
        function testAPIService() {
            try {
                // Test method existence
                const methods = ['fetchJSON', 'loadModels', 'loadParameters', 'loadContent'];
                const results = methods.map(method => {
                    const exists = typeof apiService[method] === 'function';
                    return `${method}: ${exists ? 'EXISTS' : 'MISSING'}`;
                });
                
                logToSection('api-log', results.join(', '));
                
                // Test base configuration
                logToSection('api-log', `Base URL: ${apiService.baseURL}`);
                
                logResult('api-result', 'API service structure working correctly');
                
            } catch (error) {
                logResult('api-result', 'Error: ' + error.message, true);
                logToSection('api-log', 'Error: ' + error.message);
            }
        }
        
        function testFullIntegration() {
            try {
                logToSection('integration-log', 'Starting full integration test...');
                
                // Test enhanced chat app initialization
                const isInitialized = enhancedChatApp.initialized;
                logToSection('integration-log', `Enhanced chat app initialized: ${isInitialized}`);
                
                // Test module interconnection
                stateManager.set('testIntegration', 'integrationValue');
                const retrieved = stateManager.get('testIntegration');
                logToSection('integration-log', `State <-> Integration: ${retrieved === 'integrationValue' ? 'PASS' : 'FAIL'}`);
                
                // Test theme integration
                const currentTheme = themeManager.getCurrentTheme();
                logToSection('integration-log', `Theme integration: ${currentTheme}`);
                
                // Test agent system integration
                const agentConfig = agentManager.getAgentConfig('orchestrator');
                logToSection('integration-log', `Agent integration: ${agentConfig.name}`);
                
                logToSection('integration-log', 'All integration tests completed');
                logResult('integration-result', 'Full integration working correctly');
                
            } catch (error) {
                logResult('integration-result', 'Error: ' + error.message, true);
                logToSection('integration-log', 'Error: ' + error.message);
            }
        }
        
        // Auto-run initial tests
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                testModuleLoading();
            }, 500);
        });
    </script>
</body>
</html>
