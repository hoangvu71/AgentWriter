<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BooksWriter AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }
        
        .placeholder {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 60px 40px;
            margin-top: 40px;
        }
        
        .placeholder h2 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .placeholder p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 0;
        }
        
        .nav-btn {
            display: inline-block;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            margin-top: 24px;
        }
        
        .nav-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">AI</div>
                BooksWriter AI
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="/admin" class="nav-link secondary">Admin</a>
                <a href="/library" class="nav-link">Library</a>
            </div>
        </div>
    </header>

    <!-- Admin Container -->
    <div class="admin-container">
        <h1>⚙️ Admin</h1>
        
        <div class="placeholder">
            <h2>Admin Panel Coming Soon</h2>
            <p>The admin functionality is currently being rebuilt. Please return to the main chat to create and manage content.</p>
            <a href="/" class="nav-btn">← Back to Chat</a>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
